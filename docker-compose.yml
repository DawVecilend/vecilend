services:
  db:
    build: ./db
    container_name: vecilend_db
    restart: always
    environment:
      POSTGRES_DB: vecilend_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: vecilend_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: vecilend_db
      DB_USERNAME: admin
      DB_PASSWORD: admin
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: vecilend_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
